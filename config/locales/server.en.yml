en:
  site_settings:
    ao3_fanfic_enabled: "Enable AO3Chat reader workflows."
    ao3_fanfic_require_fandom_tags: "Require at least one fandom tag on AO3 fanfic topics."
    ao3_fanfic_paid_rooms_enabled: "Show AO3Chat supporter tier and private fandom room prompts."
    ao3_fanfic_supporter_group_name: "Group that unlocks AO3Chat private fandom rooms. Subscription plans should grant this group."
    ao3_fanfic_private_rooms_category_slug: "Category slug used for AO3Chat private fandom rooms."
    ao3_fanfic_featured_fandom_slugs: "Category slugs to promote as featured fandom homes on the AO3Chat home page."
    ao3_fanfic_supporter_price_label: "Reader-facing price label for the AO3Chat supporter tier."
    ao3_fanfic_supporter_monthly_amount_cents: "Monthly supporter tier amount in the smallest Stripe currency unit."
    ao3_fanfic_subscribe_url: "Reader-facing AO3Chat supporter tier landing URL."
    ao3_fanfic_supporter_checkout_url: "Checkout URL opened from the AO3Chat supporter tier page."
    ao3_fanfic_crypto_payments_enabled: "Show configured cryptocurrency payment options on the AO3Chat supporter tier page."
    ao3_fanfic_crypto_btc_address: "Bitcoin receiving address for AO3Chat supporter payments."
    ao3_fanfic_crypto_ltc_address: "Litecoin receiving address for AO3Chat supporter payments."
    ao3_fanfic_crypto_xmr_address: "Monero receiving address for AO3Chat supporter payments."
    ao3_fanfic_subscription_product_id: "Stripe product id used for the AO3Chat supporter tier."
    ao3_fanfic_allowed_content_warnings: "Canonical content warnings shown to clients and used when custom content warnings are disabled."
    ao3_fanfic_allow_custom_content_warnings: "Allow users to enter content warnings outside the canonical warning list."
    ao3_fanfic_filter_page_size: "Default page size for the AO3 topic filter endpoint."
  ao3_fanfic:
    account_page:
      brand: "AO3Chat"
      title: "AO3Chat accounts"
      body: "Use a local reader account for discussion, fic recs, spoiler filters, and room access. Your AO3 username is not required."
      details_label: "AO3Chat account details"
      identity_title: "Reader identity"
      identity_points:
        - "Choose a handle made for AO3Chat, not your public AO3 or social profile."
        - "Use email login and recovery without connecting an external social account."
        - "Keep fandom discussion separate from archive comments and bookmarks."
      access_title: "Access and safety"
      access_points:
        - "Public rooms stay open to readers according to category permissions."
        - "Private fandom rooms use real supporter group access."
        - "Admins can audit accounts for safety, moderation, and payment support."
      state:
        signed_out_title: "Create a local reader account"
        signed_out_body: "Start with an AO3Chat handle, then join discussions or unlock private rooms through the supporter tier."
        signed_in_title: "You are signed in"
        signed_in_body: "Signed in as %{username}. You can open AO3Chat or review supporter access for private rooms."
      cta:
        create: "Create account"
        log_in: "Log in"
        open: "Open AO3Chat"
        supporter: "Supporter tier"
    supporter_page:
      brand: "AO3Chat"
      title: "Private fandom rooms"
      body: "Support AO3Chat and unlock smaller group-restricted spaces for fandom circles, ship rooms, readalongs, and spoiler-heavy discussion."
      price_label: "Supporter tier price"
      price_prefix: "From"
      details_label: "Supporter tier details"
      benefits_title: "What supporters get"
      benefits:
        - "Private rooms by fandom, ship, readalong, or spoiler policy."
        - "Room requests reviewed by staff before new spaces open."
        - "Access controlled by the supporter group, not cosmetic labels."
        - "A way to fund AO3Chat without public ads or selling reader data."
      access_title: "How access works"
      access_steps:
        - "Create a local AO3Chat account with a handle separate from AO3."
        - "Join the supporter tier through checkout."
        - "Private room access is granted by group membership and remains staff-auditable."
      footer: "Private rooms are restricted by category permissions. Public rooms, recs, searches, and spoiler-labeled discussions remain available to all signed-in readers."
      state:
        account_title: "Start with an AO3Chat account"
        account_body: "Create a local reader account first, then return here to join the supporter tier and request private rooms."
        ready_title: "Your account is ready"
        ready_body: "Choose a payment method to join the supporter tier. Stripe can grant access automatically when configured; crypto receipts are verified by staff."
        active_title: "Private room access is active"
        active_body: "You can open existing private rooms or request a new fandom, ship, readalong, or spoiler-heavy space."
      cta:
        create_account: "Create account"
        log_in: "Log in"
        join: "Join supporter tier"
        choose_payment: "Choose payment method"
        open_rooms: "Open private rooms"
        browse_public: "Browse public rooms"
      payments:
        title: "Payment methods"
        body: "Use Stripe for card payments when available, or send crypto and submit the transaction for staff verification."
        stripe_title: "Stripe"
        stripe_body: "Card checkout is the cleanest path because it can grant the supporter group automatically after payment."
        stripe_cta: "Pay with Stripe"
        stripe_unavailable: "Stripe checkout is not configured yet."
        automatic_badge: "Automatic"
        manual_badge: "Manual"
        crypto_title: "Crypto"
        crypto_body: "Send %{code} to this address, then submit the transaction id so staff can verify the payment and add supporter access."
        crypto_cta: "Submit transaction"
        crypto_login_note: "Create an account or log in before submitting a crypto transaction."
        crypto_unavailable: "Crypto receiving addresses are not configured yet."
        none_configured: "No payment methods are configured yet. Add a Stripe checkout URL or crypto receiving addresses in admin settings."
        address_label: "%{code} address"
        transaction_label: "Transaction id"
        amount_label: "Amount or note"
    errors:
      fandom_required: "Add at least one fandom tag."
      invalid_discussion_type: "Choose a valid AO3 discussion type."
      invalid_content_warnings: "These content warnings are not allowed: %{warnings}."
    crypto_payment:
      methods:
        btc:
          name: "Bitcoin"
          network: "BTC"
        ltc:
          name: "Litecoin"
          network: "LTC"
        xmr:
          name: "Monero"
          network: "XMR"
      errors:
        transaction_required: "Enter the transaction id before submitting."
      flash:
        submitted: "Transaction submitted for staff verification."
        failed: "The transaction could not be submitted. Please try again."
        unavailable: "That crypto payment method is not configured."
      staff_message:
        title: "AO3Chat crypto supporter payment: %{username} (%{code})"
        body: |
          A reader submitted a crypto supporter payment for verification.

          **Reader:** @%{username}
          **Profile:** %{user_url}
          **Method:** %{method} (%{code})
          **Receiving address:** `%{address}`
          **Transaction id:** `%{transaction_id}`
          **Amount or note:** %{amount_note}

          After verifying the payment, add the reader to the AO3Chat supporter group.
        unspecified: "Not specified"
    room_requests:
      title: "Private room request: %{fandom}"
      title_with_ship: "Private room request: %{fandom} - %{ship}"
      body:
        heading: "Private room request"
        fandom: "**Fandom:** %{value}"
        ship: "**Ship or focus:** %{value}"
        purpose: "**Room purpose:** %{value}"
        spoiler_policy: "**Spoiler policy:** %{value}"
        comfort_notes: "**Comfort notes:** %{value}"
        unspecified: "Not specified"
      errors:
        category_missing: "Private fandom rooms are not configured yet."
        supporter_required: "Private room requests are available to AO3Chat supporters."
        fandom_required: "Choose a fandom for the private room request."
        create_failed: "The private room request could not be created. Please try again."
